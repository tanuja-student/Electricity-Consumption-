<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
   
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2111d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Visualization - Admin Panel</title>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Top Navigation Bar -->
            <header class="flex items-center justify-between px-6 py-4 border-b bg-white sticky top-0">
                <h2 class="text-xl font-bold">Dashboard</h2>
                <nav class="hidden md:flex gap-8">
                    <a href="index.html">Home</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="story.html">Story</a>
                    <a href="visualization.html">Visualizations</a>
                    <a href="conclusion.html">Conclusion</a>
                </nav>
                <button id="menuBtn" class="md:hidden">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </header>
            <div id="mobileMenu" class="hidden md:hidden border-b bg-white">
                <nav class="flex flex-col p-4 gap-4">
                    <a href="index.html">Home</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="story.html">Story</a>
                    <a href="visualization.html">Visualizations</a>
                    <a href="conclusion.html">Conclusion</a>
                </nav>
            </div>
            <main class="flex-1">
                <div class="px-10 py-10 space-y-20">

                    <!-- Total Consumption -->
                    <div>
                        <h2 class="text-2xl font-bold text-primary mb-6">Total Electricity Consumption</h2>

                        <iframe
                            src="https://public.tableau.com/views/Book4_17728921597520/TotalConsumption?:embed=true&:showVizHome=no"
                            width="100%" style="height:90vh" frameborder="0">
                        </iframe>
                    </div>

                    <!-- Regionwise Consumption -->
                    <div>
                        <h2 class="text-2xl font-bold text-primary mb-6">Regionwise State Consumption</h2>

                        <iframe
                            src="https://public.tableau.com/views/Book4_17728921597520/RegionwiseStateConsumption?:embed=true&:showVizHome=no"
                            width="100%" style="height:90vh" frameborder="0">
                        </iframe>
                    </div>

                    <!-- Quarterly Electricity Usage -->
                    <div>
                        <h2 class="text-2xl font-bold text-primary mb-6">Quarter Wise Electricity Usage</h2>

                        <iframe
                            src="https://public.tableau.com/views/Book4_17728921597520/QuarterWiseUsage?:embed=true&:showVizHome=no"
                            width="100%" style="height:90vh" frameborder="0">
                        </iframe>
                    </div>

                    <!-- Top Consuming States -->
                    <div>
                        <h2 class="text-2xl font-bold text-primary mb-6">Top Electricity Consuming States</h2>

                        <iframe
                            src="https://public.tableau.com/views/Book4_17728921597520/TopN?:embed=true&:showVizHome=no"

                        </iframe>

                </div>
                <div class="flex flex-1">

                    <footer
                        class="mt-12 py-6 border-t border-slate-200 dark:border-slate-800 flex justify-between items-center text-slate-400 text-xs">
                        <p>© 2024 AdminPanel Analytics Engine. All rights reserved.</p>

                    </footer>
            </main>
        </div>
    </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const b = document.getElementById("menuBtn");
            const m = document.getElementById("mobileMenu");
            b.addEventListener("click", () => m.classList.toggle("hidden"));
        });
    </script>
</body>

</html>
